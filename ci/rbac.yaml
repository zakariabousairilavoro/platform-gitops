apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-build-role
  namespace: ci
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - create
      - delete

  - apiGroups: ["tekton.dev"]
    resources:
      - taskruns
      - pipelineruns
    verbs:
      - get
      - list
      - watch
      - create
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-build-binding
  namespace: ci
subjects:
  - kind: ServiceAccount
    name: tekton-build-sa
    namespace: ci
roleRef:
  kind: Role
  name: tekton-build-role
  apiGroup: rbac.authorization.k8s.io
